<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2196f3">
  <title>Best Life Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Roboto, Arial, sans-serif; background: #f9f9f9; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 10px; }
    h2 { margin: 20px 0 10px 0; }
    h3 { margin: 15px 0 10px 0; font-size: 16px; }
    .settings { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 10px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
    input[type="time"], input[type="date"], input[type="number"], textarea { 
      width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; 
    }
    label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: bold; }
    button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #333; color: #fff; }
    .btn-success { background: #4caf50; color: #fff; }
    .btn-info { background: #2196f3; color: #fff; }
    .btn-danger { background: #f44336; color: #fff; }
    .view-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .view-tabs button { width: 100%; }
    .view-tabs button.active { background: #333; }
    .view-tabs button:not(.active) { background: #999; color: #fff; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .card-blue { background: #e3f2fd; }
    .card-orange { background: #fff3e0; }
    .step { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
    .step.done { background: #e8f5e9; opacity: 0.7; }
    .step-header { display: flex; justify-content: space-between; align-items: start; }
    .step-time { font-weight: bold; font-size: 13px; }
    .verse-card { background: #faf8f3; border: 2px solid #8b7355; border-radius: 8px; padding: 20px; margin-bottom: 20px; text-align: center; }
    .verse-text { font-style: italic; font-size: 14px; margin-bottom: 10px; }
    .verse-controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    .add-verse { background: #fff9f0; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
    .anytime-item { background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
    .anytime-item.done { background: #e8f5e9; opacity: 0.7; }
    .progress-bar { background: #fff; height: 10px; border-radius: 4px; overflow: hidden; margin-top: 10px; }
    .progress-fill { background: #2196f3; height: 100%; }
    .hydration-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
    .hydration-buttons button { padding: 8px; font-size: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>BEST LIFE TRACKER</h1>
    
    <div class="settings">
      <div class="grid-2">
        <div><label>Wake Time</label><input type="time" id="wakeTime" value="06:45"></div>
        <div><label>Bedtime (for sleep tracking)</label><input type="time" id="bedTime" value="22:00" onchange="state.bedTime=this.value;saveData(document.getElementById('currentDate').value);"></div>
      </div>
      
      <div style="margin-top:10px;">
        <label>Date</label><input type="date" id="currentDate">
      </div>
      
      <button onclick="submitDashboardSleep()" style="margin-top:10px;background:#4caf50;color:#fff;width:100%;padding:10px;">
        ✓ Submit Bedtime/Wake Time for This Date
      </button>
      <div id="sleepSubmitStatus" style="font-size:14px;margin-top:6px;color:#4caf50;"></div>
      
      <div class="view-tabs">
        <button class="active" onclick="setView('routine')">📋 Routine</button>
        <button onclick="setView('tracking')">📊 Tracking</button>
        <button onclick="setView('projects')">⏱️ Projects</button>
        <button onclick="setView('workouts')">💪 Workouts</button>
      </div>
      
      <div class="grid-2" style="margin-top: 10px;">
        <button class="btn-success" onclick="exportData()">⬇️ Export Data</button>
        <label style="background: #2196f3; color: #fff; padding: 10px; border-radius: 6px; cursor: pointer; text-align: center; margin: 0;">
          ⬆️ Import Data
          <input type="file" accept=".json" onchange="importData(event)" style="display: none;">
        </label>
      </div>
    </div>

    <div id="routineView"></div>
    <div id="trackingView" class="hidden"></div>
    <div id="projectsView" class="hidden"></div>
    <div id="workoutsView" class="hidden"></div>
  </div>

  <script>
const VERSES = [
  { text: "For God hath not given us the spirit of fear; but of power, and of love, and of a sound mind.", reference: "2 Timothy 1:7", id: 1 },
  { text: "I can do all things through Christ which strengtheneth me.", reference: "Philippians 4:13", id: 2 },
  { text: "Be strong and of a good courage: be not afraid, neither be thou dismayed: for the LORD thy God is with thee whithersoever thou goest.", reference: "Joshua 1:9", id: 3 },
  { text: "Peace I leave with you, my peace I give unto you: not as the world giveth, give I unto you.", reference: "John 14:27", id: 4 },
  { text: "The Lord is my light and my salvation; whom shall I fear?", reference: "Psalm 27:1", id: 5 },
  { text: "Commit thy way unto the LORD; trust also in him; and he shall bring it to pass.", reference: "Psalm 37:5", id: 6 },
  { text: "For I know the thoughts that I think toward you, saith the LORD, thoughts of peace, and not of evil.", reference: "Jeremiah 29:11", id: 7 },
  { text: "Let this mind be in you, which was also in Christ Jesus.", reference: "Philippians 2:5", id: 8 },
  { text: "I have fought a good fight, I have finished my course, I have kept the faith.", reference: "2 Timothy 4:7", id: 9 },
  { text: "And we know that all things work together for good to them that love God.", reference: "Romans 8:28", id: 10 },
  { text: "Trust in the LORD with all thine heart; and lean not unto thine own understanding.", reference: "Proverbs 3:5", id: 11 },
  { text: "The joy of the LORD is your strength.", reference: "Nehemiah 8:10", id: 12 },
  { text: "Let us therefore come boldly unto the throne of grace, that we may obtain mercy.", reference: "Hebrews 4:16", id: 13 },
  { text: "For as a man thinketh in his heart, so is he.", reference: "Proverbs 23:7", id: 14 },
  { text: "Blessed is the man whose strength is in thee; in whose heart are the ways of them.", reference: "Psalm 84:5", id: 15 },
  { text: "He giveth power to the faint; and to them that have no might he increaseth strength.", reference: "Isaiah 40:29", id: 16 },
  { text: "I will praise thee; for I am fearfully and wonderfully made.", reference: "Psalm 139:14", id: 17 },
  { text: "Finally, brethren, whatsoever things are true, whatsoever things are honest, think on these things.", reference: "Philippians 4:8", id: 18 },
  { text: "And the peace of God, which passeth all understanding, shall keep your hearts and minds through Christ Jesus.", reference: "Philippians 4:7", id: 19 },
  { text: "But they that wait upon the LORD shall renew their strength; they shall mount up with wings as eagles.", reference: "Isaiah 40:31", id: 20 }
];

const ROUTINE = {
  wakeup: { name: 'Check belt notches', duration: 1, trackable: false, scheduled: true },
  hydrate: { name: 'Hydrate + iced coffee + take pills', duration: 2, trackable: false, scheduled: true },
  cash: { name: 'Greet Cash', duration: 2, trackable: false, scheduled: true },
  verse: { name: 'Verse card', duration: 2, trackable: true, scheduled: true },
  housework: { name: 'Quick housework win', duration: 4, trackable: false, scheduled: true },
  riceSockMassage: { name: 'Rice sock + self-massage', duration: 12, trackable: true, scheduled: true },
  coldWater: { name: 'Cold water face + mirror', duration: 2, trackable: false, scheduled: true },
  breathing: { name: 'Box breathing (4-4-4-4)', duration: 5, trackable: true, scheduled: true },
  timeWithGodMed: { name: 'Time With God + Meditation (prayer + directives)', duration: 5, trackable: true, scheduled: true },
  prayWithSusan: { name: 'Prayer with Susan', duration: 5, trackable: true, scheduled: true },
  mindTraining: { name: 'Mind Training app (10 min)', duration: 10, trackable: true, scheduled: true },
  groomingSkincare: { name: 'Grooming/Skincare', duration: 10, trackable: true, scheduled: true },
  breakfast: { name: 'Breakfast prep', duration: 5, trackable: false, scheduled: true },
  eat: { name: 'Breakfast + hydrate + Give Cash supplements', duration: 5, trackable: true, scheduled: true },
  workout: { name: '15 min workout', duration: 15, trackable: true, scheduled: true },
  cashWalk: { name: '10 min walking Cash/steps', duration: 10, trackable: true, scheduled: true },
  workStart: { name: 'Begin work', duration: 5, trackable: false, scheduled: true },
  
  // Anytime activities (no scheduled times)
  cashActivity: { name: '15 min activity with Cash', trackable: true, scheduled: false },
  stretchMobility: { name: 'Stretching + Standing mobility (knees→back→arms)', trackable: true, scheduled: false },
  workoutA: { name: 'Workout A', trackable: true, scheduled: false, exercises: ['Hip hinge', 'Squat', 'Side steps', 'Glute bridges', 'Calf raises'] },
  workoutB: { name: 'Workout B', trackable: true, scheduled: false, exercises: ['Overhead press', 'Chest press', 'Row', 'Rear shoulders', 'Bicep curl', 'Tricep ext'] },
  workoutC: { name: 'Workout C', trackable: true, scheduled: false, exercises: ['Suitcase carry', 'Lateral raises', 'Rotation', 'Dead bug/bird dog'] },
  cardio: { name: 'Cardio', trackable: true, scheduled: false },
  foodLog: { name: 'Log food', trackable: true, scheduled: false },
};

const SCHEDULED_ORDER = ['wakeup', 'hydrate', 'cash', 'verse', 'housework', 'riceSockMassage', 'coldWater', 'breathing', 'timeWithGodMed', 'prayWithSusan', 'mindTraining', 'groomingSkincare', 'breakfast', 'eat', 'workout', 'cashWalk', 'workStart'];
const ANYTIME_ORDER = ['cashActivity', 'stretchMobility', 'workoutA', 'workoutB', 'workoutC', 'cardio', 'foodLog'];

let state = {
  view: 'routine',
  verses: [...VERSES],
  verseIndex: 0,
  completed: {},
  anytimeCompleted: {},
  hydration: 0,
  projectTimers: { BNBS: 0, DEV: 0, CAREER: 0, IREC: 0 },
  activeProject: null,
  timerRunning: false,
  bedTime: '22:00',
  weeklyData: {},
  anytimeWeeklyData: {},
  projectWeeklyData: {},
  workoutComponents: {
    A: { 'Hip hinge': 0, 'Squat': 0, 'Side steps': 0, 'Glute bridges': 0, 'Calf raises': 0 },
    B: { 'Overhead press': 0, 'Chest press': 0, 'Row': 0, 'Rear shoulders': 0, 'Bicep curl': 0, 'Tricep ext': 0 },
    C: { 'Suitcase carry': 0, 'Lateral raises': 0, 'Rotation': 0, 'Dead bug/bird dog': 0 }
  },
  sleepData: {},
  sleepTimes: {}
};

function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('currentDate').value = today;
  document.getElementById('bedTime').value = state.bedTime;
  loadData(today);
  render();
  let saveTickCounter = 0;
  setInterval(() => {
    if (state.timerRunning && state.activeProject) {
      state.projectTimers[state.activeProject]++;
      render();
      saveTickCounter++;
      if (saveTickCounter >= 10) {
        saveTickCounter = 0;
        saveState();
      }
    }
  }, 1000);
}

function loadData(date) {
  const completed = localStorage.getItem(`completed_${date}`);
  const anytime = localStorage.getItem(`anytime_${date}`);
  const hydration = localStorage.getItem(`hydration_${date}`);
  const projects = localStorage.getItem(`projects_${date}`);
  const workouts = localStorage.getItem(`workouts_${date}`);
  const verses = localStorage.getItem('verses');
  const verseIndex = localStorage.getItem('verseIndex');
  
  if (completed) state.completed = JSON.parse(completed);
  if (anytime) state.anytimeCompleted = JSON.parse(anytime);
  if (hydration) state.hydration = parseInt(hydration);
  if (projects) state.projectTimers = JSON.parse(projects);
  if (workouts) state.workoutComponents = JSON.parse(workouts);
  if (verses) state.verses = JSON.parse(verses);
  if (verseIndex) state.verseIndex = parseInt(verseIndex);
  
  // Load all sleep data from this week
  const monday = getMondayOfWeek(date);
  const d = new Date(monday);
  for (let i = 0; i < 7; i++) {
    const dayDate = new Date(d);
    dayDate.setDate(dayDate.getDate() + i);
    const dayStr = dayDate.toISOString().split('T')[0];
    const sleepHours = localStorage.getItem(`sleep_${dayStr}`);
    if (sleepHours) state.sleepData[dayStr] = parseFloat(sleepHours);
    const bed = localStorage.getItem(`sleepBed_${dayStr}`);
    const wake = localStorage.getItem(`sleepWake_${dayStr}`);
    if (bed || wake) state.sleepTimes[dayStr] = { bed: bed || '', wake: wake || '' };
  }
}

function saveData(date) {
  localStorage.setItem(`completed_${date}`, JSON.stringify(state.completed));
  localStorage.setItem(`anytime_${date}`, JSON.stringify(state.anytimeCompleted));
  localStorage.setItem(`hydration_${date}`, state.hydration);
  localStorage.setItem(`projects_${date}`, JSON.stringify(state.projectTimers));
  localStorage.setItem(`workouts_${date}`, JSON.stringify(state.workoutComponents));
  localStorage.setItem('verses', JSON.stringify(state.verses));
  localStorage.setItem('verseIndex', state.verseIndex);
}

function submitDashboardSleep() {
  const date = document.getElementById('currentDate').value;
  const bed = document.getElementById('bedTime').value;
  const wake = document.getElementById('wakeTime').value;
  const status = document.getElementById('sleepSubmitStatus');
  if (!date || !bed || !wake) {
    status.style.color = '#f44336';
    status.textContent = 'Please set date, bedtime, and wake time first.';
    return;
  }
  updateSleepTimes(date, bed, wake);
  const hours = computeSleepDuration(bed, wake);
  status.style.color = '#4caf50';
  status.textContent = `Saved: ${hours.toFixed(1)}h sleep for ${date} (bed ${bed} → wake ${wake})`;
}

function updateSleepTimes(dayStr, bed, wake) {
  state.sleepTimes[dayStr] = { bed, wake };
  localStorage.setItem(`sleepBed_${dayStr}`, bed);
  localStorage.setItem(`sleepWake_${dayStr}`, wake);
  if (bed && wake) {
    const hours = computeSleepDuration(bed, wake);
    state.sleepData[dayStr] = hours;
    localStorage.setItem(`sleep_${dayStr}`, hours.toFixed(1));
  }
  render();
}

function computeSleepDuration(bedStr, wakeStr) {
  const [bh, bm] = bedStr.split(':').map(Number);
  const [wh, wm] = wakeStr.split(':').map(Number);
  let bedMinutes = bh * 60 + bm;
  let wakeMinutes = wh * 60 + wm;
  if (wakeMinutes <= bedMinutes) wakeMinutes += 24 * 60;
  return (wakeMinutes - bedMinutes) / 60;
}

function updateSleepHours(dayStr, hours) {
  state.sleepData[dayStr] = hours;
  localStorage.setItem(`sleep_${dayStr}`, hours.toFixed(1));
  render();
}

function saveState() {
  const date = document.getElementById('currentDate').value || new Date().toISOString().split('T')[0];
  saveData(date);
}

function setView(view) {
  state.view = view;
  document.querySelectorAll('.view-tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function toggleStep(key) {
  state.completed[key] = !state.completed[key];
  const date = document.getElementById('currentDate').value;
  saveData(date);
  render();
}

function toggleAnytime(key, exercise = null) {
  if (!state.anytimeCompleted[key]) state.anytimeCompleted[key] = {};
  if (exercise) {
    state.anytimeCompleted[key][exercise] = !state.anytimeCompleted[key][exercise];
  } else {
    state.anytimeCompleted[key].done = !state.anytimeCompleted[key].done;
  }
  const date = document.getElementById('currentDate').value;
  saveData(date);
  render();
}

function addHydration(oz) {
  state.hydration = Math.min(state.hydration + oz, 180);
  const date = document.getElementById('currentDate').value;
  saveData(date);
  render();
}

function toggleWorkoutComponent(type, component) {
  state.workoutComponents[type][component]++;
  const date = document.getElementById('currentDate').value;
  saveData(date);
  render();
}

let inputIdleTimeout;

function updateProjectTime(proj, h, m, s) {
  state.projectTimers[proj] = h * 3600 + m * 60 + s;
  state.timerRunning = false;
  clearTimeout(inputIdleTimeout);
  inputIdleTimeout = setTimeout(() => {
    state.timerRunning = true;
    render();
  }, 5000);
  saveState();
  render();
}

function toggleTimer(project) {
  if (state.activeProject === project) {
    state.timerRunning = !state.timerRunning;
  } else {
    state.activeProject = project;
    state.timerRunning = true;
  }
  saveState();
  render();
}

function nextVerse() {
  state.verseIndex = (state.verseIndex + 1) % state.verses.length;
  localStorage.setItem('verseIndex', state.verseIndex);
  render();
}

function prevVerse() {
  state.verseIndex = state.verseIndex === 0 ? state.verses.length - 1 : state.verseIndex - 1;
  localStorage.setItem('verseIndex', state.verseIndex);
  render();
}

function removeVerse() {
  state.verses.splice(state.verseIndex, 1);
  if (state.verses.length === 0) state.verses = [...VERSES];
  state.verseIndex = state.verseIndex >= state.verses.length ? 0 : state.verseIndex;
  localStorage.setItem('verses', JSON.stringify(state.verses));
  localStorage.setItem('verseIndex', state.verseIndex);
  render();
}

function addVerse() {
  const text = document.getElementById('verseText').value;
  const ref = document.getElementById('verseRef').value;
  if (!text || !ref) return alert('Enter verse text and reference');
  state.verses.push({ text, reference: ref, id: Date.now() });
  localStorage.setItem('verses', JSON.stringify(state.verses));
  document.getElementById('verseText').value = '';
  document.getElementById('verseRef').value = '';
  render();
}

function getStepTime(offset) {
  const wake = document.getElementById('wakeTime').value;
  let [h, m] = wake.split(':').map(Number);
  m += offset;
  if (m >= 60) {
    h += Math.floor(m / 60);
    m = m % 60;
  }
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

function calculateSleep() {
  const wake = document.getElementById('wakeTime').value;
  const bed = document.getElementById('bedTime').value;
  const bedH = parseInt(bed.split(':')[0]);
  const bedM = parseInt(bed.split(':')[1]);
  const wakeH = parseInt(wake.split(':')[0]);
  const wakeM = parseInt(wake.split(':')[1]);
  
  let bedMin = bedH * 60 + bedM;
  let wakeMin = wakeH * 60 + wakeM;
  if (wakeMin < bedMin) wakeMin += 24 * 60;
  
  return (wakeMin - bedMin) / 60;
}

function calculateBurndownTime(wakeTime, offsetFromEnd) {
  // Work starts at 8:30
  const deadline = 8 * 60 + 30; // 8:30 in minutes
  const [wh, wm] = wakeTime.split(':').map(Number);
  const wakeMin = wh * 60 + wm;
  
  const deadlineMin = deadline - offsetFromEnd;
  const h = Math.floor(deadlineMin / 60);
  const m = deadlineMin % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
}

function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff)).toISOString().split('T')[0];
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function exportData() {
  const backup = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    backup[key] = localStorage.getItem(key);
  }
  const date = document.getElementById('currentDate').value;
  const file = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url;
  a.download = `routine-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const backup = JSON.parse(event.target.result);
      Object.entries(backup).forEach(([key, value]) => {
        localStorage.setItem(key, value);
      });
      alert('Data restored. Refreshing...');
      location.reload();
    } catch (err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function render() {
  if (state.view === 'routine') renderRoutine();
  else if (state.view === 'tracking') renderTracking();
  else if (state.view === 'projects') renderProjects();
  else if (state.view === 'workouts') renderWorkouts();
}

function renderRoutine() {
  let html = '';
  const verse = state.verses[state.verseIndex];
  
  if (verse) {
    html += `
      <div class="verse-card">
        <div class="verse-text">${verse.text}</div>
        <div class="verse-ref">${verse.reference}</div>
        <div class="verse-controls">
          <button onclick="prevVerse()">← Prev</button>
          <button onclick="nextVerse()">Next →</button>
          <button onclick="removeVerse()" style="background:#f44336;color:#fff;">Remove</button>
        </div>
      </div>
    `;
  }
  
  html += `
    <div class="add-verse">
      <h3>Add Verse</h3>
      <textarea id="verseText" placeholder="Verse text (KJV)" style="min-height:60px;"></textarea>
      <input id="verseRef" type="text" placeholder="Reference (e.g., John 3:16)">
      <button class="btn-success" onclick="addVerse()" style="width:100%;margin-top:10px;">+ Add Verse</button>
    </div>
    
    <h2>Scheduled Morning (Deadlines to finish by)</h2>
    <!-- Updated: 2026-07-07 -->
  `;
  

  
  const wake = document.getElementById('wakeTime').value;
  const [wh, wm] = wake.split(':').map(Number);
  let timeOffset = 0;
  
  SCHEDULED_ORDER.forEach((key, index) => {
    const step = ROUTINE[key];
    
    let startMin = wh * 60 + wm + timeOffset;
    const startH = Math.floor(startMin / 60);
    const startM = startMin % 60;
    const startTime = `${String(startH).padStart(2, '0')}:${String(startM).padStart(2, '0')} a.m.`;
    
    const done = state.completed[key];
    
    html += `
      <div class="step ${done ? 'done' : ''}">
        <div class="step-header">
          <div>
            <div class="step-time">${startTime} ${step.name}</div>
          </div>
          ${step.trackable ? `<button onclick="toggleStep('${key}')" style="background:${done ? '#4caf50' : '#f0f0f0'};color:${done ? '#fff' : '#333'};">${done ? '✓' : 'Mark'}</button>` : ''}
        </div>
      </div>
    `;
    timeOffset += step.duration;
  });
  
  html += `
    <h2>Hydration</h2>
    <div class="card">

}

function getScheduledDoneForDate(k, dateStr) {
  const currentDate = document.getElementById('currentDate').value;
  if (dateStr === currentDate) return state.completed[k] ? 1 : 0;
  const raw = localStorage.getItem(`completed_${dateStr}`);
  if (!raw) return 0;
  try { return JSON.parse(raw)[k] ? 1 : 0; } catch (e) { return 0; }
}

function getAnytimeDoneForDate(k, dateStr) {
  const currentDate = document.getElementById('currentDate').value;
  if (dateStr === currentDate) return state.anytimeCompleted[k]?.done ? 1 : 0;
  const raw = localStorage.getItem(`anytime_${dateStr}`);
  if (!raw) return 0;
  try { return JSON.parse(raw)[k]?.done ? 1 : 0; } catch (e) { return 0; }
}

function getWorkoutCountForDate(type, comp, dateStr) {
  const currentDate = document.getElementById('currentDate').value;
  if (dateStr === currentDate) return state.workoutComponents[type][comp] || 0;
  const raw = localStorage.getItem(`workouts_${dateStr}`);
  if (!raw) return 0;
  try { return JSON.parse(raw)[type]?.[comp] || 0; } catch (e) { return 0; }
}

function sumOverRange(getterFn, startDateStr, endDateStr) {
  let total = 0;
  const d = new Date(startDateStr);
  const end = new Date(endDateStr);
  while (d <= end) {
    const dateStr = d.toISOString().split('T')[0];
    total += getterFn(dateStr);
    d.setDate(d.getDate() + 1);
  }
  return total;
}

function renderTracking() {

              <label style="font-size:12px;">Or type hours: <input type="number" step="0.5" value="${sleepHours}" onchange="updateSleepHours('${dayStr}', parseFloat(this.value))" style="width:50px;padding:4px;"/>h</label>
            </div>`;

    <h2>Weekly/Monthly/Annual Totals</h2>

      <h3>Scheduled Trackables</h3>
      ${trackable.map(k => {
        const done = state.completed[k] ? 1 : 0;
        const isDaily = ['groomingSkincare', 'eat', 'workout', 'cashWalk'].includes(k);
        const weeklyTarget = isDaily ? 7 : 3;
        const monthlyGoal = isDaily ? daysInMonth : Math.ceil(daysInMonth * 3 / 7);
        const annualGoal = isDaily ? daysInYear : 156;
        const weeklyCount = sumOverRange(dt => getScheduledDoneForDate(k, dt), weekStart, date);
        const monthlyCount = sumOverRange(dt => getScheduledDoneForDate(k, dt), monthStart, date);
        const annualCount = sumOverRange(dt => getScheduledDoneForDate(k, dt), yearStart, date);
        const weeklyPct = Math.round(weeklyCount / weeklyTarget * 100);
        const monthlyPct = Math.round(monthlyCount / monthlyGoal * 100);
        const annualPct = Math.round(annualCount / annualGoal * 100);
        return `<div style="font-size:16px;margin-bottom:10px;padding:8px;background:#f0f0f0;border-radius:4px;">

        const done = state.anytimeCompleted[k]?.done ? 1 : 0;

        const weeklyCount = sumOverRange(dt => getAnytimeDoneForDate(k, dt), weekStart, date);
        const monthlyCount = sumOverRange(dt => getAnytimeDoneForDate(k, dt), monthStart, date);

            <tbody>${rows}</tbody>

      }).join('')}
    </div>
  `;
  
  document.getElementById('trackingView').innerHTML = html;
  document.getElementById('routineView').classList.add('hidden');
  document.getElementById('projectsView').classList.add('hidden');
  document.getElementById('workoutsView').classList.add('hidden');
  document.getElementById('trackingView').classList.remove('hidden');
}

function getProjectHoursForDate(proj, dateStr) {
  const currentDate = document.getElementById('currentDate').value;
  if (dateStr === currentDate) {
    return (state.projectTimers[proj] || 0) / 3600;
  }
  const raw = localStorage.getItem(`projects_${dateStr}`);
  if (!raw) return 0;
  try {
    const data = JSON.parse(raw);
    return (data[proj] || 0) / 3600;
  } catch (e) {
    return 0;
  }
}

function sumProjectHours(proj, startDateStr, endDateStr) {
  let total = 0;
  const d = new Date(startDateStr);
  const end = new Date(endDateStr);
  while (d <= end) {
    const dateStr = d.toISOString().split('T')[0];
    total += getProjectHoursForDate(proj, dateStr);
    d.setDate(d.getDate() + 1);
  }
  return total;
}

function clearProjectTimer(proj) {
  if (!confirm(`Clear today's ${proj} timer back to 0? This won't affect past days already recorded.`)) return;
  state.projectTimers[proj] = 0;
  if (state.activeProject === proj) state.timerRunning = false;
  saveState();
  render();
}

function renderProjects() {
  let html = `<h2>Project Work Tracking</h2>
    <div class="grid-4" style="margin-bottom:20px;">`;
  
  ['BNBS', 'DEV', 'CAREER', 'IREC'].forEach(proj => {
    const isActive = state.activeProject === proj;
    const totalSeconds = (state.projectTimers[proj] || 0);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    const displayTime = `${hours}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
    html += `
      <div style="background:${isActive ? '#e3f2fd' : '#f5f5f5'};border:${isActive ? '2px solid #2196f3' : '1px solid #ddd'};border-radius:8px;padding:15px;">
        <div style="font-size:16px;font-weight:bold;margin-bottom:10px;">${proj}</div>
        <div style="font-size:1.3em;font-weight:bold;margin-bottom:10px;">${displayTime}</div>
        <div style="font-size:1em;margin-bottom:10px;">
          <label>H: <input type="number" value="${hours}" onchange="updateProjectTime('${proj}', parseInt(this.value), parseInt(document.getElementById('${proj}_m').value || 0), parseInt(document.getElementById('${proj}_s').value || 0))" id="${proj}_h" style="width:40px;padding:2px;"/></label>
          <label>M: <input type="number" value="${minutes}" onchange="updateProjectTime('${proj}', parseInt(document.getElementById('${proj}_h').value || 0), parseInt(this.value), parseInt(document.getElementById('${proj}_s').value || 0))" id="${proj}_m" style="width:40px;padding:2px;"/></label>
          <label>S: <input type="number" value="${seconds}" onchange="updateProjectTime('${proj}', parseInt(document.getElementById('${proj}_h').value || 0), parseInt(document.getElementById('${proj}_m').value || 0), parseInt(this.value))" id="${proj}_s" style="width:40px;padding:2px;"/></label>
        </div>
        <button onclick="toggleTimer('${proj}')" style="background:${isActive && state.timerRunning ? '#4caf50' : '#2196f3'};color:#fff;width:100%;padding:8px;margin-bottom:6px;">
          ${isActive && state.timerRunning ? '⏸ Stop' : '▶ Start'}
        </button>
        <button onclick="clearProjectTimer('${proj}')" style="background:#eee;color:#333;width:100%;padding:6px;font-size:0.85em;">
          Clear Today
        </button>
      </div>
    `;
  });
  
  html += `</div>`;
  if (state.timerRunning) {
    html += `<button onclick="state.timerRunning=false;saveState();render()" style="background:#f44336;color:#fff;width:100%;margin-bottom:20px;">⏹ Stop All</button>`;
  }
  
  const date = document.getElementById('currentDate').value;
  const d = new Date(date);
  const yearStart = `${d.getFullYear()}-01-01`;
  const monthStart = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`;
  const weekStart = getMondayOfWeek(date);
  
  const targets = { BNBS: 15, DEV: 15, CAREER: 6, IREC: 4 };
  const monthlyTargets = { BNBS: 64.5, DEV: 64.5, CAREER: 25.8, IREC: 17.2 };
  const annualTargets = { BNBS: 780, DEV: 780, CAREER: 312, IREC: 208 };
  
  html += `
    <h3>Weekly</h3>
    <div class="card">
      ${['BNBS', 'DEV', 'CAREER', 'IREC'].map(proj => {
        const hours = sumProjectHours(proj, weekStart, date).toFixed(1);
        const target = targets[proj];
        const pct = Math.round((hours / target) * 100);
        return `<div style="font-size:16px;margin-bottom:10px;"><strong>${proj}</strong>: ${hours}/${target}h (${pct}%)</div>`;
      }).join('')}
    </div>
    
    <h3>Monthly</h3>
    <div class="card">
      ${['BNBS', 'DEV', 'CAREER', 'IREC'].map(proj => {
        const monthlyAchieved = sumProjectHours(proj, monthStart, date).toFixed(1);
        const monthlyTarget = monthlyTargets[proj];
        const pct = Math.round((monthlyAchieved / monthlyTarget) * 100);
        return `<div style="font-size:16px;margin-bottom:10px;"><strong>${proj}</strong>: ${monthlyAchieved}/${monthlyTarget}h (${pct}%)</div>`;
      }).join('')}
    </div>
    
    <h3>Annual</h3>
    <div class="card">
      ${['BNBS', 'DEV', 'CAREER', 'IREC'].map(proj => {
        const annualAchieved = sumProjectHours(proj, yearStart, date).toFixed(1);
        const annualTarget = annualTargets[proj];
        const pct = Math.round((annualAchieved / annualTarget) * 100);
        return `<div style="font-size:16px;margin-bottom:10px;"><strong>${proj}</strong>: ${annualAchieved}/${annualTarget}h (${pct}%)</div>`;
      }).join('')}
    </div>
  `;
  
  document.getElementById('projectsView').innerHTML = html;
  document.getElementById('routineView').classList.add('hidden');
  document.getElementById('trackingView').classList.add('hidden');
  document.getElementById('workoutsView').classList.add('hidden');
  document.getElementById('projectsView').classList.remove('hidden');
}
